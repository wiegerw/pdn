name: Deploy Sphinx PDF Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-pdf:
    name: Build and Deploy PDF Documentation
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Check out the repository
        uses: actions/checkout@v3

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      # Install dependencies. WeasyPrint replaces the previous LaTeX-based
      # PDF build (latexmk + texlive + texlive-lang-all), which pulled in
      # several GB of mostly unused language/font packages and was a
      # recurring source of slow, flaky CI runs.
      - name: Install Sphinx and WeasyPrint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info
          python -m pip install --upgrade pip
          pip install sphinx weasyprint

      # Build a single combined HTML page, then render it to PDF
      - name: Build PDF documentation
        run: |
          sphinx-build -b singlehtml doc build/singlehtml
          mkdir -p build/pdf
          weasyprint build/singlehtml/index.html build/pdf/pdn_standard.pdf

      # Deploy PDF to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/pdf
          destination_dir: pdf
